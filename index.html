<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Music Player</title>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="background-animation">
        <div class="shape shape-1"></div>
        <div class="shape shape-2"></div>
        <div class="shape shape-3"></div>
    </div>

    <main class="app-container">
        <!-- Player Section -->
        <section class="player-section glass-panel">
            <div class="player-header">
                <button class="icon-btn" aria-label="Menu"><i class="fa-solid fa-chevron-down"></i></button>
                <span>Now Playing</span>
                <button class="icon-btn" aria-label="Options"><i class="fa-solid fa-ellipsis"></i></button>
            </div>

            <div class="artwork-container">
                <img src="https://images.unsplash.com/photo-1614613535308-eb5fbd3d2c17?q=80&w=400&auto=format&fit=crop" alt="Album Art" id="cover-art" class="artwork">
                <div class="artwork-ring"></div>
            </div>

            <div class="song-info">
                <h2 id="song-title">Song Title</h2>
                <p id="song-artist">Artist Name</p>
            </div>

            <div class="progress-container">
                <div class="time-info">
                    <span id="current-time">0:00</span>
                    <span id="duration">0:00</span>
                </div>
                <div class="progress-bar-wrapper" id="progress-wrapper">
                    <div class="progress-bar" id="progress-bar">
                        <div class="progress-thumb"></div>
                    </div>
                </div>
            </div>

            <div class="controls-container">
                <button class="icon-btn control-btn" id="prev-btn" aria-label="Previous"><i class="fa-solid fa-backward-step"></i></button>
                <button class="icon-btn play-btn" id="play-btn" aria-label="Play/Pause"><i class="fa-solid fa-play"></i></button>
                <button class="icon-btn control-btn" id="next-btn" aria-label="Next"><i class="fa-solid fa-forward-step"></i></button>
            </div>

            <div class="volume-container">
                <i class="fa-solid fa-volume-low" id="vol-icon"></i>
                <div class="volume-bar-wrapper" id="volume-wrapper">
                    <div class="volume-bar" id="volume-bar">
                        <div class="volume-thumb"></div>
                    </div>
                </div>
                <i class="fa-solid fa-volume-high"></i>
            </div>
        </section>

        <!-- Playlist Section -->
        <section class="playlist-section glass-panel">
            <div class="playlist-header">
                <h2>Playlist</h2>
                <div class="autoplay-toggle">
                    <label for="autoplay-cb">Autoplay</label>
                    <label class="switch">
                        <input type="checkbox" id="autoplay-cb" checked>
                        <span class="slider round"></span>
                    </label>
                </div>
            </div>
            
            <div class="playlist-container" id="playlist">
                <!-- Playlist items will be generated by JS -->
            </div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
